<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Control Patrulleros</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
            font-weight: bold;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #222;
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        header p {
            font-size: 0.9em;
            opacity: 0.5;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
            text-align: center;
        }

        .kpi-card:hover {
            border-color: #333;
        }

        .kpi-label {
            font-size: 0.75em;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
        }

        .kpi-operativo .kpi-value {
            color: #4ade80;
        }

        .kpi-no-operativo .kpi-value {
            color: #f87171;
        }

        .kpi-total .kpi-value {
            color: #60a5fa;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
        }

        .section h2 {
            color: #fff;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #222;
            font-size: 1.1em;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .lista-patrulleros {
            max-height: 500px;
            overflow-y: auto;
        }

        .patrullero-item {
            padding: 12px;
            margin-bottom: 10px;
            border-left: 2px solid #f87171;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .patrullero-item:hover {
            border-left-color: #f87171;
            background: #1a1a1a;
        }

        .patrullero-item.operativo {
            border-left-color: #4ade80;
        }

        .patrullero-item.selected {
            background: #222;
            border-left-color: #60a5fa;
        }

        .patrullero-numero {
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 5px;
            color: #fff;
        }

        .patrullero-info {
            font-size: 0.8em;
            opacity: 0.5;
        }

        .detalle-patrullero {
            display: none;
        }

        .detalle-patrullero.active {
            display: block;
        }

        .patrullero-imagen {
            position: relative;
            margin-bottom: 20px;
            background: #1a1a1a;
            border: 1px solid #222;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .patrullero-imagen svg {
            width: 100%;
            height: 100%;
        }

        .componentes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .componente {
            padding: 15px;
            border: 1px solid #4ade80;
            background: transparent;
            text-align: center;
            transition: all 0.3s ease;
        }

        .componente.falla {
            border-color: #f87171;
            background: transparent;
        }

        .componente-label {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #fff;
        }

        .componente-estado {
            font-size: 0.85em;
            color: #4ade80;
        }

        .componente.falla .componente-estado {
            color: #f87171;
            font-weight: bold;
        }

        .graficos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }

        .grafico-container {
            background: #111;
            border: 1px solid #222;
            padding: 20px;
        }

        .grafico-container h3 {
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
            font-size: 0.95em;
            font-weight: bold;
            letter-spacing: 1px;
        }

        canvas {
            max-height: 300px;
        }

        .botton-refresh {
            background: transparent;
            color: #fff;
            border: 1px solid #333;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 15px;
            width: 100%;
            transition: all 0.3s ease;
        }

        .botton-refresh:hover {
            border-color: #666;
            background: #1a1a1a;
        }

        .estado-badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 0.75em;
            font-weight: bold;
            margin-top: 8px;
            border: 1px solid;
        }

        .estado-badge.operativo {
            border-color: #4ade80;
            color: #4ade80;
        }

        .estado-badge.no-operativo {
            border-color: #f87171;
            color: #f87171;
        }

        .info-box {
            background: transparent;
            border-left: 1px solid #60a5fa;
            padding: 15px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #999;
        }

        .placeholder {
            text-align: center;
            color: #666;
            padding: 40px;
            font-style: italic;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 Dashboard Control Patrulleros</h1>
            <p>Sistema de Monitoreo - Guardia Urbana</p>
        </header>

        <!-- KPIs -->
        <div class="kpi-container">
            <div class="kpi-card kpi-total">
                <div class="kpi-label">Total Patrulleros</div>
                <div class="kpi-value" id="totalPatrulleros">0</div>
            </div>
            <div class="kpi-card kpi-operativo">
                <div class="kpi-label">Operativos</div>
                <div class="kpi-value" id="operativos">0</div>
            </div>
            <div class="kpi-card kpi-no-operativo">
                <div class="kpi-label">No Operativos</div>
                <div class="kpi-value" id="noOperativos">0</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">% Operativo</div>
                <div class="kpi-value" id="porcentajeOperativo">0%</div>
            </div>
        </div>

        <!-- Contenido Principal -->
        <div class="main-content">
            <!-- Lista Patrulleros No Operativos -->
            <div class="section">
                <h2>⚠️ Patrulleros No Operativos</h2>
                <div class="lista-patrulleros" id="listaPatrulleros">
                    <div class="placeholder">Cargando datos...</div>
                </div>
                <button class="botton-refresh" onclick="cargarDatos()">🔄 Recargar Datos</button>
            </div>

            <!-- Detalle Patrullero -->
            <div class="section">
                <h2>🔍 Detalles del Patrullero</h2>
                <div id="detallePatrullero" class="placeholder">
                    Selecciona un patrullero para ver los detalles
                </div>
            </div>
        </div>

        <!-- Gráficos -->
        <div class="graficos">
            <div class="grafico-container">
                <h3>Estado General</h3>
                <canvas id="graficoEstado"></canvas>
            </div>
            <div class="grafico-container">
                <h3>Por Área</h3>
                <canvas id="graficoArea"></canvas>
            </div>
        </div>
    </div>

    <script>
        let datosGlobal = null;
        let graficoEstado = null;
        let graficoArea = null;
        let archivoExcelCargado = null;

        // Cargar datos de la API de Vercel
        async function cargarDatos() {
            try {
                console.log('📡 Sincronizando datos...');

                // Intentar desde API de Vercel primero
                try {
                    const response = await fetch('/api/fetch');
                    if (!response.ok) throw new Error('API error');
                    datosGlobal = await response.json();
                    actualizarDashboard();
                    console.log('✅ Datos desde API Vercel');
                    return;
                } catch (error) {
                    console.warn('⚠️ No se pudo acceder a API, intentando datos.json local');
                }

                // Fallback: intentar datos.json local
                const response = await fetch('datos.json');
                if (!response.ok) throw new Error('Archivo no encontrado');
                datosGlobal = await response.json();
                actualizarDashboard();
                console.log('✅ Datos desde archivo local');

            } catch (error) {
                console.error('Error cargando datos:', error);
                mostrarError();
            }
        }

        // Mostrar mensaje de error
        function mostrarError() {
            const listaDiv = document.getElementById('listaPatrulleros');
            listaDiv.innerHTML = `
                <div class="info-box">
                    ⚠️ Esperando conexión con OneDrive...
                </div>
            `;
        }

        // Polling automático cada 5 segundos
        setInterval(cargarDatos, 5000);

        // Procesar datos del Excel
        function procesarExcel(arrayBuffer) {
            try {
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });

                // Obtener datos de hojas relevantes
                const datos = {
                    patrulleros: [],
                    resumen: {
                        total_operativos: 0,
                        total_no_operativos: 0,
                        total_general: 0
                    }
                };

                // Procesar hojas
                ['PATRULLA BASE', 'PATRULLA HT', 'TOTAL'].forEach(sheetName => {
                    if (!workbook.SheetNames.includes(sheetName)) return;

                    const sheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(sheet);

                    rows.forEach(row => {
                        // Validar que tenga datos relevantes
                        const movil = row['MÓVIL'] || row['Móvil'] || row['movil'] || '';
                        const estado = row['ESTADO OPERATIVO'] || row['Estado'] || 'DESCONOCIDO';

                        if (movil) {
                            const esOperativo = String(estado).toUpperCase().includes('EN SERVICIO') ||
                                              String(estado).toUpperCase().includes('OPERATIVO');

                            const patrullero = {
                                numero: String(movil).trim(),
                                serie: String(row['Nº SERIE'] || row['Serie'] || '').trim(),
                                tipo: String(row['TIPO'] || row['Tipo'] || '').trim(),
                                placa: String(row['nº placa'] || row['Placa'] || '').trim(),
                                modelo: String(row['MODELO'] || row['Modelo'] || '').trim(),
                                area: String(row['ÁREA'] || row['Area'] || '').trim(),
                                estado: String(estado).trim(),
                                operativo: esOperativo,
                                fallas: {
                                    gps: false,
                                    radio_base: false,
                                    dvr: false,
                                    camaras: false
                                }
                            };

                            // Evitar duplicados
                            if (!datos.patrulleros.find(p => p.numero === patrullero.numero)) {
                                datos.patrulleros.push(patrullero);
                            }
                        }
                    });
                });

                // Calcular resumen
                datos.resumen.total_general = datos.patrulleros.length;
                datos.resumen.total_operativos = datos.patrulleros.filter(p => p.operativo).length;
                datos.resumen.total_no_operativos = datos.resumen.total_general - datos.resumen.total_operativos;

                datosGlobal = datos;
                actualizarDashboard();
            } catch (error) {
                console.error('Error procesando Excel:', error);
                alert('Error al procesar el archivo Excel: ' + error.message);
                mostrarCargadorArchivos();
            }
        }

        // Actualizar dashboard
        function actualizarDashboard() {
            if (!datosGlobal) return;

            const resumen = datosGlobal.resumen;

            // Actualizar KPIs
            document.getElementById('totalPatrulleros').textContent = resumen.total_general;
            document.getElementById('operativos').textContent = resumen.total_operativos;
            document.getElementById('noOperativos').textContent = resumen.total_no_operativos;

            const porcentaje = resumen.total_general > 0
                ? Math.round((resumen.total_operativos / resumen.total_general) * 100)
                : 0;
            document.getElementById('porcentajeOperativo').textContent = porcentaje + '%';

            // Actualizar lista de patrulleros no operativos
            actualizarListaPatrulleros();

            // Actualizar gráficos
            actualizarGraficos();
        }

        // Actualizar lista de patrulleros no operativos
        function actualizarListaPatrulleros() {
            const lista = document.getElementById('listaPatrulleros');
            const noOperativos = datosGlobal.patrulleros.filter(p => !p.operativo);

            if (noOperativos.length === 0) {
                lista.innerHTML = '<div class="info-box">✅ Todos los patrulleros están operativos</div>';
                return;
            }

            lista.innerHTML = noOperativos.map((p, index) => `
                <div class="patrullero-item no-operativo" onclick="mostrarDetalle(${datosGlobal.patrulleros.indexOf(p)})">
                    <div class="patrullero-numero">${p.numero}</div>
                    <div class="patrullero-info">
                        <strong>Placa:</strong> ${p.placa}<br>
                        <strong>Área:</strong> ${p.area}<br>
                        <strong>Estado:</strong> ${p.estado}
                    </div>
                </div>
            `).join('');
        }

        // Mostrar detalle del patrullero
        function mostrarDetalle(index) {
            const patrullero = datosGlobal.patrulleros[index];
            const detalleDiv = document.getElementById('detallePatrullero');

            // Actualizar items de lista
            document.querySelectorAll('.patrullero-item').forEach(item => {
                item.classList.remove('selected');
            });
            event.target.closest('.patrullero-item').classList.add('selected');

            // Generar SVG de patrullero
            const svgPatrullero = generarSVGPatrullero(patrullero);

            // Actualizar componentes
            const componentesHTML = generarComponentes(patrullero.fallas);

            detalleDiv.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h3 style="color: #333; margin-bottom: 10px;">Patrullero ${patrullero.numero}</h3>
                    <div class="estado-badge ${patrullero.operativo ? 'operativo' : 'no-operativo'}">
                        ${patrullero.operativo ? '✓ OPERATIVO' : '✗ NO OPERATIVO'}
                    </div>
                </div>

                <div class="patrullero-imagen">
                    ${svgPatrullero}
                </div>

                <div>
                    <h4 style="color: #333; margin-bottom: 15px;">Estado de Componentes</h4>
                    <div class="componentes-grid">
                        ${componentesHTML}
                    </div>
                </div>

                <div class="info-box" style="margin-top: 20px;">
                    <strong>Información:</strong><br>
                    Serie: ${patrullero.serie}<br>
                    Placa: ${patrullero.placa}<br>
                    Modelo: ${patrullero.modelo}<br>
                    Tipo: ${patrullero.tipo}<br>
                    Área: ${patrullero.area}
                </div>
            `;
        }

        // Generar componentes HTML
        function generarComponentes(fallas) {
            const componentes = [
                { nombre: 'GPS', key: 'gps', icon: '📍' },
                { nombre: 'RADIO BASE', key: 'radio_base', icon: '📡' },
                { nombre: 'DVR', key: 'dvr', icon: '📹' },
                { nombre: 'CÁMARAS', key: 'camaras', icon: '📷' }
            ];

            return componentes.map(comp => {
                const tieneFalla = fallas[comp.key];
                return `
                    <div class="componente ${tieneFalla ? 'falla' : ''}">
                        <div style="font-size: 1.5em; margin-bottom: 8px;">${comp.icon}</div>
                        <div class="componente-label">${comp.nombre}</div>
                        <div class="componente-estado">
                            ${tieneFalla ? '❌ FALLA' : '✅ OK'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Generar SVG del patrullero
        function generarSVGPatrullero(patrullero) {
            return `
                <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
                    <!-- Cuerpo del auto -->
                    <rect x="80" y="80" width="240" height="80" rx="20" fill="#2c3e50" stroke="#000" stroke-width="2"/>

                    <!-- Techo -->
                    <ellipse cx="200" cy="80" rx="80" ry="40" fill="#34495e" stroke="#000" stroke-width="2"/>

                    <!-- Ruedas -->
                    <circle cx="120" cy="160" r="20" fill="#000"/>
                    <circle cx="280" cy="160" r="20" fill="#000"/>
                    <circle cx="120" cy="160" r="12" fill="#888"/>
                    <circle cx="280" cy="160" r="12" fill="#888"/>

                    <!-- Ventanas -->
                    <rect x="100" y="95" width="50" height="30" fill="#87ceeb" stroke="#000" stroke-width="1"/>
                    <rect x="250" y="95" width="50" height="30" fill="#87ceeb" stroke="#000" stroke-width="1"/>

                    <!-- Luz de sirena -->
                    <circle cx="200" cy="50" r="15" fill="${patrullero.operativo ? '#e74c3c' : '#ccc'}" stroke="#000" stroke-width="2"/>
                    <circle cx="200" cy="50" r="10" fill="${patrullero.operativo ? '#ff6b6b' : '#ddd'}"/>

                    <!-- Número de placa -->
                    <rect x="170" y="145" width="60" height="20" fill="#fff" stroke="#000" stroke-width="1"/>
                    <text x="200" y="158" text-anchor="middle" font-size="12" font-weight="bold">${patrullero.numero}</text>
                </svg>
            `;
        }

        // Actualizar gráficos
        function actualizarGraficos() {
            // Gráfico de estado
            const ctxEstado = document.getElementById('graficoEstado').getContext('2d');
            if (graficoEstado) graficoEstado.destroy();

            graficoEstado = new Chart(ctxEstado, {
                type: 'doughnut',
                data: {
                    labels: ['Operativos', 'No Operativos'],
                    datasets: [{
                        data: [datosGlobal.resumen.total_operativos, datosGlobal.resumen.total_no_operativos],
                        backgroundColor: ['#4ade80', '#f87171'],
                        borderColor: ['#0a0a0a', '#0a0a0a'],
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#fff', font: { size: 12 } }
                        }
                    }
                }
            });

            // Gráfico por área
            const areaConteo = {};
            datosGlobal.patrulleros.forEach(p => {
                const area = p.area || 'Sin área';
                if (!areaConteo[area]) {
                    areaConteo[area] = { operativos: 0, total: 0 };
                }
                areaConteo[area].total++;
                if (p.operativo) areaConteo[area].operativos++;
            });

            const areas = Object.keys(areaConteo);
            const datosOperativos = areas.map(a => areaConteo[a].operativos);
            const datosNoOperativos = areas.map(a => areaConteo[a].total - areaConteo[a].operativos);

            const ctxArea = document.getElementById('graficoArea').getContext('2d');
            if (graficoArea) graficoArea.destroy();

            graficoArea = new Chart(ctxArea, {
                type: 'bar',
                data: {
                    labels: areas,
                    datasets: [
                        {
                            label: 'Operativos',
                            data: datosOperativos,
                            backgroundColor: '#4ade80',
                            borderColor: '#4ade80',
                            borderWidth: 0
                        },
                        {
                            label: 'No Operativos',
                            data: datosNoOperativos,
                            backgroundColor: '#f87171',
                            borderColor: '#f87171',
                            borderWidth: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            stacked: false,
                            ticks: { color: '#666' },
                            grid: { color: '#222' }
                        },
                        x: {
                            ticks: { color: '#666' },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#fff', font: { size: 12 } }
                        }
                    }
                }
            });
        }

        // Cargar datos al iniciar
        cargarDatos();
    </script>
</body>
</html>
